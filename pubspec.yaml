name: lume_lucy_paperwall
description: "AI generated wallpaper app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 网络请求
  dio: ^5.4.0

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  shared_preferences: ^2.2.2

  # 图片缓存
  cached_network_image: ^3.3.1

  # 保存图片到相册
  image_gallery_saver: ^2.0.3
  path_provider: ^2.1.5
  permission_handler: ^11.3.1

  # 图片处理（添加水印）
  image: ^4.1.3

  # 内购
  in_app_purchase: ^3.1.13
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
